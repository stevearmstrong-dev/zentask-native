<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verified - ZenTask</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: linear-gradient(135deg, #0A0A0F 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 48px 32px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .icon {
            font-size: 72px;
            margin-bottom: 24px;
            animation: bounce 1s ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            color: #FFFFFF;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        p {
            color: #8E8E93;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .app-name {
            color: #1877F2;
            font-weight: 600;
        }

        .success-badge {
            display: inline-block;
            background: rgba(52, 199, 89, 0.15);
            color: #34C759;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            margin: 24px 0;
        }

        .instructions {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 24px;
            margin-top: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .instructions h2 {
            color: #EBEBF5;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .step {
            color: #8E8E93;
            font-size: 15px;
            margin-bottom: 8px;
            text-align: left;
        }

        .step strong {
            color: #EBEBF5;
        }

        .close-hint {
            margin-top: 32px;
            color: #636366;
            font-size: 14px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 32px 24px;
            }

            h1 {
                font-size: 28px;
            }

            .icon {
                font-size: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✓</div>
        <h1>Email Verified!</h1>
        <div class="success-badge">Account Activated</div>

        <p>Your email has been successfully verified for <span class="app-name">ZenTask</span>.</p>

        <div class="instructions">
            <h2>Next Steps</h2>
            <div class="step"><strong>1.</strong> Return to the ZenTask app</div>
            <div class="step"><strong>2.</strong> Sign in with your email and password</div>
            <div class="step"><strong>3.</strong> Start managing your tasks!</div>
        </div>

        <p class="close-hint">You can safely close this page.</p>
    </div>
</body>
</html>
